<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Newsletter Sign-Up</title>
</head>
<body>
    <form action="#" method="get" name="newsletter" id="newsletter">
        <div>
            <label for="firstName">First Name</label>
            <input
                type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>
        </div>

        <div>
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="jsmith@example.com" autocomplete="email" required>
        </div>

        <div>
            <input type="submit" value="Subscribe">
        </div>
    </form>
</body>
</html>
