<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Nebula - Project Solution</title>
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #00d2ff;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        /* --- SECTION 1: MACRO LAYOUT (CSS TODOs 1-2) --- */

        /* CSS TODO 1: 
           Set up the body as a grid container with exactly two rows. 
           The top row should expand to fill all available space (1fr). 
           The bottom row should be sized to fit its content (auto).
        */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: 1fr auto;
        }

        /* CSS TODO 2: 
           Make the HTML5 <main> element a grid container.
           Use longhand properties (align-items and justify-items) 
           to center the registration form horizontally and vertically in the middle of the screen.
        */
        main {
            display: grid;
            align-items: center;
            justify-items: center;
            padding: 20px;
        }

        /* --- SECTION 2: THE "SKIN" (Decorative Styling) --- */

        .registration-form {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            /* box-shadow: 0 10px 30px rgba(0,0,0,0.5); */
        }

        h2 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
        }

        input, textarea {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 4px;
            font: inherit; /* Inherit font styles from parent */
        }

        /* CSS TODO 3: 
           Make the form more user-friendly by adding a focus state to all inputs.
           When the user clicks into a field, change the border color 
           and add a subtle glow effect.
        */
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.3);
        }

        .submit-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer {
            background: #000;
            padding: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
        }

        /* --- SECTION 3: FORM GRID SKELETON (CSS TODOs 4-6) --- */

        .field-container {
            display: grid;
            gap: 20px;
            align-items: center;

            /* CSS TODO 4: 
               Define a 2-column layout using grid-template-areas.
               Map out rows for the username, email, and bio.
               Use a 'spacer' (period) in the bottom row to keep the button aligned on the righthand
               side of the form.
            */
            grid-template-columns: 140px 1fr;
            grid-template-areas: 
                "label-user  input-user"
                "label-mail  input-mail"
                "label-bio   input-bio"
                ".           button";
        }

        /* CSS TODO 5: 
           Individually assign each form element (labels and inputs) 
           to its corresponding grid area defined in TODO 4.
        */
        label[for="username"] { grid-area: label-user; }
        #username             { grid-area: input-user; }
        label[for="email"]    { grid-area: label-mail; }
        #email                { grid-area: input-mail; }
        label[for="bio"]      { grid-area: label-bio; align-self: start; }
        #bio                  { grid-area: input-bio; }
        .submit-btn           { grid-area: button; }

        /* CSS TODO 6: 
           Create a media query for mobile screens.
           Modify the grid-template-areas so that labels sit on top of inputs 
           in a single, vertical column.
        */
        @media (max-width: 600px) {
            .field-container {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "label-user" "input-user"
                    "label-mail" "input-mail"
                    "label-bio" "input-bio"
                    "button";
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <main>
        <form class="registration-form" method="POST">
            <h2>Join Apex Nebula</h2>
            
            <div class="field-container">
                
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="bio">Player Bio</label>
                <textarea id="bio" name="bio" rows="4"></textarea>

                <button type="submit" class="submit-btn">Launch Account</button>
            </div>
        </form>
    </main>

    <footer>
        &copy; 20XX Apex Nebula Gaming Platform.
    </footer>

</body>
</html>
