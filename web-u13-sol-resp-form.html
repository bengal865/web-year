<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Grid Form</title>

<style>
/* ------------------------------
   Global Reset
------------------------------ */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ------------------------------
   Form Grid (Mobile First)
------------------------------ */

/* TODO 1: 
   Use template areas to create a one-column layout in mobile view.
   Set a maximum width of 800px on the grid container.
   Center the container horizontally in your browser window.
   Apply some padding to your container.   
*/
/* SOL START */
.grid-form {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-areas:
        "name"
        "email"
        "dept"
        "interest"
        "contact"
        "message"
        "submit";
    gap: 20px;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}
/* SOL END */

/* 
   TODO 2: Define 7 grid areas.
   Grid areas: name, email, dept, interest, contact, message, submit
*/

   
/* SOL START */
.field-name     { grid-area: name; }
.field-email    { grid-area: email; }
.field-dept     { grid-area: dept; }
.field-interest { grid-area: interest; }
.field-contact  { grid-area: contact; }
.field-message  { grid-area: message; }
.field-submit   { grid-area: submit; }
/* SOL END */

/* ------------------------------
   Desktop Layout
------------------------------ */
/* TODO 3: 
   - Write a media query for when browser window is 600px wide or above
   - Two-column layout (each 1fr)
   - Write template area map for two-column layout
*/
   
/* SOL START */
@media (min-width: 600px) {
    .grid-form {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
            "name     email"
            "dept     dept"
            "interest contact"
            "message  message"
            "submit   submit";
    }
}
/* SOL END */

   
/* ------------------------------
   Field Layout (Grid Only)
------------------------------ */

/* TODO 4: 
   - Define a class named field
   - Set up as 1-column layout in CSS Grid
   - Set width to 100%
   - Add a small gap
*/
/* SOL START */
.field {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    width: 100%;
}
/* SOL END */

/* ------------------------------
   Form Elements
------------------------------ */
.form-label {
    font-weight: bold;
}

.form-input {
    width: 100%;
    padding: 10px;
}

.form-button {
    width: 100%;
    padding: 12px;
    cursor: pointer;
}

/* ------------------------------
   Checkbox & Radio Options
------------------------------ */

/* TODO 4: 
   - Define a class named option
   - Set up as 2-column layout in CSS Grid
   - Width of COL 1 is auto
   - Width of COL 2 is 1fr
   - Add a small gap
   - Use align-items property to center grid items vertically
   - margin bottom is 5px
*/
/* SOL START */
.option {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px;
    align-items: center;
    margin-bottom: 5px;
}
/* SOL END */

.option-label {
    font-weight: normal;
}
</style>
</head>

<body>

<form class="grid-form">
<!-- TODO 4: 
   - Add  7 DIV containers with class of "field" and the specific field class for each form element
   - Insde each DIV, add the specific form elements with labels 
   - NOTE: Use the option class for checkbox and radio options
-->

<!-- SOL START  -->
    <div class="field field-name">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" type="text" id="name" placeholder="John Smith">
    </div>
<!-- SOL END -->

<!-- SOL START  -->
    <div class="field field-email">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="jsmith@gmail.com">
    </div>
<!-- SOL END  -->

<!-- SOL START  -->
    <div class="field field-dept">
        <label class="form-label" for="dept">Department</label>
        <select class="form-input" id="dept">
            <option>Choose a department...</option>
            <option>Sales</option>
            <option>Support</option>
            <option>Billing</option>
        </select>
    </div>
<!-- SOL END  -->

<!-- SOL START  -->
    <div class="field field-interest">
        <label class="form-label">Interests</label>

        <div class="option">
            <input type="checkbox" id="design">
            <label class="option-label" for="design">Design</label>
        </div>

        <div class="option">
            <input type="checkbox" id="dev">
            <label class="option-label" for="dev">Development</label>
        </div>
    </div>
<!-- SOL END  -->

<!-- SOL START  -->
    <div class="field field-contact">
        <label class="form-label">Contact Via</label>

        <div class="option">
            <input type="radio" name="contact" id="email-radio" checked>
            <label class="option-label" for="email-radio">Email</label>
        </div>

        <div class="option">
            <input type="radio" name="contact" id="phone-radio">
            <label class="option-label" for="phone-radio">Phone</label>
        </div>
    </div>
    <!-- SOL END  -->


    <!-- SOL START  -->
    <div class="field field-message">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-input" id="message" rows="4" placeholder="Please enter your message"></textarea>
    </div>
    <!-- SOL END  -->

    <!-- SOL START  -->
    <div class="field field-submit">
        <button class="form-button" type="submit">Submit</button>
    </div>
    <!-- SOL END  -->
</form>

</body>
</html>
