<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Address Form / Part 3</title>
</head>
<style>
    /* ------------------------------
    Global Reset
    ------------------------------ */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ------------------------------
    Form Grid (Mobile First)
    ------------------------------ */

    /* TODO 1: 
    Use template areas to create a one-column layout in mobile view.
    Set a maximum width of 800px on the grid container.
    Center the container horizontally in your browser window.
    Apply some padding to your container.   
    */
    /* SOL START */
    .grid-form {
        display: grid;
        grid-template-columns: 1fr;
        /* Mobile-first layout */
        grid-template-areas:
            "fname"
            "lname"
            "address1"
            "address2"
            "city"
            "state"
            "zip"
            "country"
            "submit";
        gap: 20px;
        max-width: 800px;
        margin: 0 auto;
        padding: 10px;
    }
    /* SOL END */


    button {
        margin-top: 10px;
    }

    /* Map elements to template areas */

    .first-name {
        grid-area: fname;
    }
    .last-name {
        grid-area: lname;
    }
    .address1 {
        grid-area: address1;
    }
    .address2 {
        grid-area: address2;
    }
    .city {
        grid-area: city;
    }
    .state {
        grid-area: state;
    }   
    .zip {
        grid-area: zip;
    }
    .country {
        grid-area: country;
    }
    .submit {
        grid-area: submit;
    }

@media (min-width: 600px) { 
        /* TODO 2: 
        Change the grid to a two-column layout for viewports 600px and wider.
        Use template areas to position the First Name and Last Name fields side by side in the first row.
        Position the City and Statefields in the second row.
        Position the Zip and Country fields in the third row.
        The Address Line 1 and Address Line 2 fields should each span both columns in their own rows.
        The Submit button should be positioned in the bottom right corner.
        */

        /* SOL START */
        .grid-form {
            grid-template-columns: 1fr 1fr;
            grid-template-areas:
                "fname lname"
                "address1 address1"
                "address2 address2"
                "city state"
                "zip country"
                ". submit";
        }
        /* SOL END */
    }

    /* Some basic form styling */
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input[type="text"], select {
        width: 100%;
        padding: 8px;
        border: 1px solid #2e7ebc;
    }

    button {
        padding: 10px 15px;
        background-color: #2e7ebc;
        color: white;
        border: none;
        cursor: pointer;
    }

</style>

<body>

    <form class="grid-form" action="#" method="post" name="order" id="order">
        <div class="first-name">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" name="first-name" required placeholder="Enter your first name">
        </div>

        <div class="last-name">
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last-name" required placeholder="Enter your last name">
        </div>

        <div>
            <label for="address1">Address Line 1:</label>
            <input type="text" id="address1" name="address1" required placeholder="Enter your street address">
        </div>

        <div>
            <label for="address2">Address Line 2:</label>
            <input type="text" id="address2" name="address2" placeholder="Apt, Suite, etc. (optional)">
        </div>

        <div>
            <label for="city">City:</label>
            <input type="text" id="city" name="city" required placeholder="Enter your city">
        </div>

        <div>
            <label for="state">State:</label>
            <select id="state" name="state" required>
                <option>Select your state</option>
                <option value="CA">California</option>
                <option value="NY">New York</option>
                <option value="TX">Texas</option>
                <option value="FL">Florida</option>
                <option value="IL">Illinois</option>
            </select>
        </div>

        <div>
            <label for="zip">Zip:</label>
            <input type="text" id="zip" name="zip" maxlength="5" required placeholder="Enter your five-digit zip code">
        </div>

        <div>
            <label for="country">Country:</label>
            <select id="country" name="country" required>
                <option>Select your country</option>
                <option value="US">United States</option>
                <option value="MX">Mexico</option>
                <option value="UK">United Kingdom</option>
                <option value="AU">Australia</option>
                <option value="DE">Germany</option>
            </select>
        </div>

        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
    
    <script src="main.js"></script>

</body>

</html>
