<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Nebula - Pro Registration</title>
    <style>

        :root {
            --primary: #00d2ff;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #fff;
        }
        
        /* --- THE BODY GRID --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            
            
            /* The 1fr auto trick:** By setting the body to `grid-template-rows: 1fr auto;`, the `<main>` tag is told to "take all the space you can," while the `<footer>` is told "only take exactly what you need." This keeps the footer at the bottom even if the form is small. */

                display: grid;
            /* Row 1 (Form) expands, Row 2 (Footer) stays at the bottom */
            grid-template-rows: 1fr auto; 
            grid-template-columns: 100%;
        }

        /* Centering the form within the top grid cell */
        main {
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .registration-form {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* --- FORM GRID (TEMPLATE AREAS) --- */
        .field-container {
            display: grid;
            gap: 20px;
            align-items: center;
            grid-template-areas: 
                "label-user  input-user"
                "label-mail  input-mail"
                "label-bio   input-bio"
                ".           button";
            grid-template-columns: 140px 1fr;
        }

        label[for="username"] { grid-area: label-user; }
        #username             { grid-area: input-user; }
        label[for="email"]    { grid-area: label-mail; }
        #email                { grid-area: input-mail; }
        label[for="bio"]      { grid-area: label-bio; align-self: start; }
        #bio                  { grid-area: input-bio; }
        .submit-btn           { grid-area: button; }

        /* General Input Styling */
        input, textarea {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .submit-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- THE FOOTER --- */
        footer {
            background: #000;
            padding: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            border-top: 1px solid #333;
        }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 600px) {
            .field-container {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "label-user" "input-user"
                    "label-mail" "input-mail"
                    "label-bio" "input-bio"
                    "button";
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <main>
        <form class="registration-form">
            <h2>Join Apex Nebula</h2>
            <div class="field-container">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="bio">Player Bio</label>
                <textarea id="bio" name="bio" rows="4"></textarea>

                <button type="submit" class="submit-btn">Launch Account</button>
            </div>
        </form>
    </main>

    <footer>
        &copy; 20XX Apex Nebula Gaming Platform. All Rights Reserved.
    </footer>

</body>
</html>
